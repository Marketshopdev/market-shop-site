<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Produits | Market Shop</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/components.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo"><a href="index.html"><img src="./img/logo.png" alt="Logo Market Shop"></a></div>
            <button class="menu-toggle"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html" class="nav-link">Accueil</a></li>
                    <li><a href="about.html" class="nav-link">À propos</a></li>
                    <li><a href="products.html" class="nav-link active">Produits</a></li>
                    <li><a href="services.html" class="nav-link">Services</a></li>
                    <li><a href="gallery.html" class="nav-link">Galerie</a></li>
                    <li><a href="contact.html" class="nav-link contact-btn">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="products-section">
            <h1 class="section-title">Catalogue Produits</h1>
            
            <div class="products-grid">
                <!-- Exemple de Carte Produit -->
                <article class="product-card">
                    <img src="https://via.placeholder.com/300x200" alt="Produit 1">
                    <h3>Nom du Produit</h3>
                    <p class="price">15.000 FCFA</p>
                    <a href="contact.html" class="btn-product">Commander</a>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300x200" alt="Produit 2">
                    <h3>Nom du Produit</h3>
                    <p class="price">25.000 FCFA</p>
                    <a href="contact.html" class="btn-product">Commander</a>
                </article>
                
                <!-- Tu pourras dupliquer cet article autant de fois que nécessaire -->
            </div>
        </section>
    </main>

    <script src="./js/main.js" defer></script>
</body>
      </html>
