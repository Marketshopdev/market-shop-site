<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="OXCfjG_D4Gy8ua__v1RB2anN-SQVJIDHO9bx6kXyWOo" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Market Shop</title>
    <meta name="description" content="Contactez Market Shop par téléphone, WhatsApp, email ou via notre formulaire. Nous vous répondons rapidement.">
    <meta property="og:title" content="Market Shop | Tout ce dont vous avez besoin, au meilleur prix">
<meta property="og:description" content="Market Shop vous propose une large gamme de produits et services de qualité, avec un accompagnement personnalisé.">
<meta property="og:image" content="https://[TON-DOMAINE].com/img/logo.png">
<meta property="og:url" content="https://[TON-DOMAINE].com/index.html">
<meta property="og:type" content="website">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a192f">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/components.css">
</head>

    <body class="page-contact">

    <div id="header-placeholder"></div>

    <main>
        <section class="contact-section">
            <span class="hero-tag">Parlons-en</span>
            <h1 class="section-title">Contactez-nous</h1>
            <p class="contact-subtitle">Une question, une commande, un devis ? Notre équipe vous répond rapidement par téléphone, WhatsApp ou email.</p>

            <!-- Moyens de contact rapides -->
            <div class="contact-quick-grid">
                <a href="tel:+22879499501" class="contact-quick-card">
                    <span class="contact-quick-icon">📞</span>
                    <h3>Appelez-nous</h3>
                    <p>+228 79 49 95 01</p>
                </a>
                <a href="https://wa.me/[TON_NUMERO_WHATSAPP]" target="_blank" class="contact-quick-card">
                    <span class="contact-quick-icon">💬</span>
                    <h3>WhatsApp</h3>
                    <p>Réponse rapide</p>
                </a>
                <a href="mailto:[TON_EMAIL]" class="contact-quick-card">
                    <span class="contact-quick-icon">✉️</span>
                    <h3>Email</h3>
                    <p>[TON_EMAIL]</p>
                </a>
            </div>

            <div class="contact-container">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Téléphone</label>
                        <input type="tel" id="phone" name="phone" placeholder="Votre numéro" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Votre email">
                    </div>
                    <div class="form-group">
                        <label for="subject">Sujet</label>
                        <input type="text" id="subject" name="subject" placeholder="Objet de votre demande" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Décrivez votre besoin" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Envoyer sur WhatsApp</button>
                </form>
            </div>
        </section>

        <!-- Carte Google Maps -->
        <section class="map-section">
            <h2 class="section-title">Nous trouver</h2>
            <div class="map-container">
                <iframe
                    src="https://www.google.com/maps?q=[TON_ADRESSE_URL_ENCODEE]&output=embed"
                    width="100%"
                    height="400"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    title="Localisation Market Shop">
                </iframe>
            </div>
            <p class="map-address">📍 [TON_ADRESSE]</p>
        </section>
    </main>

<div id="footer-placeholder"></div>

<script src="./js/includes.js" defer></script>
<script src="./js/site-settings.js" defer></script>
<script src="./js/analytics.js" defer></script>
<script src="./js/main.js" defer></script>
<script src="./js/share.js" defer></script>
</body>
    </html>
