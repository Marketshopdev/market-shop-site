<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | Market Shop</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a192f">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="page-admin">

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="./img/logo.png" alt="Logo Market Shop">
                </a>
            </div>
            <a href="index.html" class="btn-outline admin-back-link">← Retour au site</a>
        </div>
    </header>

    <main>
        <section class="page-intro" id="loginScreen">
            <span class="hero-tag">Espace privé</span>
            <h1>Connexion Administration</h1>
            <div class="contact-container admin-panel">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="votre email" autocomplete="off" name="admin-user-field">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" placeholder="votre mot de passe" autocomplete="new-password" name="admin-pass-field">
                </div>
                <button id="loginBtn" class="btn-submit">Se connecter</button>
                <p id="loginError" class="admin-error-msg"></p>
            </div>
        </section>

        <section class="page-intro" id="adminScreen" style="display:none;">
            <span class="hero-tag">Espace privé</span>
            <h1>Gestion des produits</h1>
            <p>Connecté en tant que <strong id="adminEmail"></strong> — <a href="#" id="logoutBtn" class="admin-logout-link">Se déconnecter</a></p>

            <div class="contact-container admin-panel">
    <h2 class="admin-panel-title" id="formTitle">Ajouter un produit</h2>
    <form id="productForm">
                    <div class="form-group">
                        <label for="nom">Nom du produit / service</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="prix">Prix (laisser vide pour "Sur Devis")</label>
                        <input type="text" id="prix" name="prix" placeholder="Ex: 15000">
                    </div>
                    <div class="form-group">
                        <label for="emplacement">Où afficher ce contenu ?</label>
                        <select id="emplacement" name="emplacement" class="admin-select">
                            <option value="produits">Page Produits</option>
                            <option value="accueil-haut">Accueil (mise en avant)</option>
                            <option value="services">Page Services</option>
                        </select>
                    </div>
                    <div class="form-group">
    <label for="image">Photo</label>
    <input type="file" id="image" name="image" accept="image/*" required>
    <small id="imageHint" class="admin-loading-msg"></small>
</div>
<button type="submit" class="btn-submit" id="submitBtn">Ajouter le produit</button>
<button type="button" id="cancelEditBtn" class="btn-outline" style="display:none; margin-top:10px; width:100%;">Annuler la modification</button>
                    <p id="formMessage" class="admin-form-msg"></p>
                </form>
            </div>

            <div class="contact-container admin-panel admin-panel-list">
                <h2 class="admin-panel-title">Produits publiés</h2>
                <p id="listLoading" class="admin-loading-msg">Chargement...</p>
                <div id="productsList"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Market Shop. Espace administration.</p>
        </div>
    </footer>

    <script src="./js/firebase-config.js"></script>
    <script src="./js/admin.js" defer></script>
</body>
</html>
